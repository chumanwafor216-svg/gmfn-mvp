<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GSN Public Shop</title>
    <meta
      name="description"
      content="Open a trusted public shop on GSN, where community identity, products, and public shop diaries are visible in one place."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Global Support Network" />
    <meta property="og:title" content="GSN Public Shop" />
    <meta
      property="og:description"
      content="Open a trusted public shop on GSN, where community identity, products, and public shop diaries are visible in one place."
    />
    <meta
      property="og:image"
      content="https://gmfn-frontend.onrender.com/gsn-share-poster.svg"
    />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GSN Public Shop" />
    <meta
      name="twitter:description"
      content="Open a trusted public shop on GSN, where community identity, products, and public shop diaries are visible in one place."
    />
    <meta
      name="twitter:image"
      content="https://gmfn-frontend.onrender.com/gsn-share-poster.svg"
    />
    <script>
      (function () {
        try {
          if (window.location.hostname.toLowerCase() !== "frontend.onrender.com") {
            return;
          }

          window.location.replace(
            "https://gmfn-frontend.onrender.com" +
              window.location.pathname +
              window.location.search +
              window.location.hash
          );
        } catch (_) {
          // React will run the same host guard if this early redirect is blocked.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
