<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gsn-app-icon.svg" />
    <link rel="apple-touch-icon" href="/gsn-app-icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#061827" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GSN" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>GSN</title>
    <meta
      name="description"
      content="Open a trusted GSN public link for community access, shop viewing, or trust-supported action."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Global Support Network" />
    <meta property="og:title" content="GSN Public Link" />
    <meta
      property="og:description"
      content="Open a trusted GSN public link for community access, shop viewing, or trust-supported action."
    />
    <meta
      property="og:image"
      content="https://gmfn-frontend.onrender.com/gsn-share-poster.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GSN Public Link" />
    <meta
      name="twitter:description"
      content="Open a trusted GSN public link for community access, shop viewing, or trust-supported action."
    />
    <meta
      name="twitter:image"
      content="https://gmfn-frontend.onrender.com/gsn-share-poster.png"
    />
    <script>
      (function () {
        try {
          if (window.location.hostname.toLowerCase() !== "frontend.onrender.com") {
            return;
          }

          window.location.replace(
            "https://gmfn-frontend.onrender.com" +
              window.location.pathname +
              window.location.search +
              window.location.hash
          );
        } catch (_) {
          // React will run the same host guard if this early redirect is blocked.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
