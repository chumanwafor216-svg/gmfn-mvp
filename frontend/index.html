<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gsn-app-icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/gsn-app-icon-ios-180.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#061827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="GSN" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>GSN</title>
    <meta
      name="description"
      content="Check the current GSN page before you act."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Global Support Network" />
    <meta property="og:title" content="GSN Public Record" />
    <meta
      property="og:description"
      content="Check the current GSN page before you act."
    />
    <meta
      property="og:image"
      content="https://gmfn-frontend.onrender.com/gsn-share-poster.png"
    />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GSN Public Record" />
    <meta
      name="twitter:description"
      content="Check the current GSN page before you act."
    />
    <meta
      name="twitter:image"
      content="https://gmfn-frontend.onrender.com/gsn-share-poster.png"
    />
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var entryFrom = String(params.get("entry_from") || "")
            .trim()
            .toLowerCase();
          var coverWelcomeSession = "";
          try {
            coverWelcomeSession = String(
              window.sessionStorage.getItem("gmfn_cover_welcome_session") || ""
            )
              .trim()
              .toLowerCase();
          } catch (_) {
            coverWelcomeSession = "";
          }

          if (window.location.hostname.toLowerCase() !== "frontend.onrender.com") {
            if (
              window.location.pathname === "/welcome" &&
              (entryFrom !== "cover" || coverWelcomeSession !== "active")
            ) {
              params.delete("entry_from");
              window.location.replace(
                "/cover" +
                  (params.toString() ? "?" + params.toString() : "") +
                  window.location.hash
              );
            }
            return;
          }

          window.location.replace(
            "https://gmfn-frontend.onrender.com" +
              window.location.pathname +
              window.location.search +
              window.location.hash
          );
        } catch (_) {
          // React will run the same host guard if this early redirect is blocked.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
