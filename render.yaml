services:
  - type: web
    name: gmfn-api
    runtime: python
    rootDir: gmfn_backend
    region: frankfurt
    plan: starter
    buildCommand: pip install --no-cache-dir -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /var/data/gmfn-uploads
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gmfn-postgres
          property: connectionString
      - key: GMFN_DEV_MODE
        value: "0"
      - key: GMFN_AUTO_CREATE_SCHEMA
        value: "0"
      - key: GMFN_ENTRY_PHONE_DELIVERY
        value: preview
      - key: GMFN_ENABLE_RECONCILIATION_LOOP
        value: "0"
      - key: GMFN_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: GMFN_UPLOADS_DIR
        value: /var/data/gmfn-uploads
      - key: GMFN_SECRET_KEY
        generateValue: true
      - key: GMFN_HMAC_SECRET
        generateValue: true
      - key: GMFN_CORS_ORIGINS
        sync: false
      - key: GMFN_WEBHOOK_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false

  - type: web
    name: gmfn-frontend
    runtime: node
    rootDir: frontend
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: gmfn-postgres
    region: frankfurt
    plan: basic-1gb
    postgresMajorVersion: "16"
    ipAllowList: []
