name: Trigger Render Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Also trigger the gmfn-api deploy hook"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: render-deploy-main
  cancel-in-progress: false

jobs:
  trigger-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    env:
      RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_FRONTEND_SERVICE_ID: srv-d7h4oe9f9bms739lhh9g
      RENDER_API_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
      RENDER_API_DEPLOY_HOOK_URL: ${{ secrets.RENDER_API_DEPLOY_HOOK_URL }}
      DEPLOY_API_INPUT: ${{ github.event.inputs.deploy_api || 'false' }}
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Trigger frontend deploy hook
        if: ${{ env.RENDER_FRONTEND_DEPLOY_HOOK_URL != '' }}
        run: |
          echo "Triggering Render deploy for gmfn-frontend at ${GITHUB_SHA}."
          frontend_deploy_hook_url="$(printf '%s' "$RENDER_FRONTEND_DEPLOY_HOOK_URL" | tr -d '[:space:]')"
          if [ -z "$frontend_deploy_hook_url" ]; then
            echo "::error::RENDER_FRONTEND_DEPLOY_HOOK_URL is configured but empty after trimming whitespace."
            exit 1
          fi
          curl -fsS -X POST "$frontend_deploy_hook_url"
          echo "gmfn-frontend deploy hook accepted the request."

      - name: Trigger frontend deploy through Render API
        if: ${{ env.RENDER_FRONTEND_DEPLOY_HOOK_URL == '' && env.RENDER_API_KEY != '' && env.RENDER_FRONTEND_SERVICE_ID != '' }}
        run: |
          echo "Triggering Render API deploy for gmfn-frontend service ${RENDER_FRONTEND_SERVICE_ID} at ${GITHUB_SHA}."
          curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_FRONTEND_SERVICE_ID}/deploys" \
            -H "accept: application/json" \
            -H "authorization: Bearer ${RENDER_API_KEY}" \
            -H "content-type: application/json" \
            --data "{\"commitId\":\"${GITHUB_SHA}\"}"
          echo "gmfn-frontend Render API deploy accepted the request."

      - name: Note missing frontend deploy credentials
        if: ${{ env.RENDER_FRONTEND_DEPLOY_HOOK_URL == '' && (env.RENDER_API_KEY == '' || env.RENDER_FRONTEND_SERVICE_ID == '') }}
        run: |
          echo "::warning::Neither RENDER_FRONTEND_DEPLOY_HOOK_URL nor a usable RENDER_API_KEY plus RENDER_FRONTEND_SERVICE_ID is configured. This workflow cannot directly trigger gmfn-frontend. Render must auto-deploy main or the deploy must be triggered manually in Render."

      - name: Detect backend deploy need
        id: backend
        shell: bash
        run: |
          set -euo pipefail
          should_deploy_api="false"
          if [ "$DEPLOY_API_INPUT" = "true" ]; then
            should_deploy_api="true"
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -Eq '^(gmfn_backend/|render\.yaml$)'; then
              should_deploy_api="true"
            fi
          fi
          echo "should_deploy_api=${should_deploy_api}" >> "$GITHUB_OUTPUT"
          echo "Backend deploy needed: ${should_deploy_api}"

      - name: Resolve API Render service
        id: api_service
        if: ${{ steps.backend.outputs.should_deploy_api == 'true' && env.RENDER_API_KEY != '' }}
        run: |
          set -euo pipefail
          api_service_id="$(printf '%s' "$RENDER_API_SERVICE_ID" | tr -d '[:space:]')"
          if [ -z "$api_service_id" ]; then
            echo "RENDER_API_SERVICE_ID is not configured. Looking up gmfn-api through Render API."
            if ! services_json="$(curl -fsS \
              -H "accept: application/json" \
              -H "authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services?name=gmfn-api&limit=20")"; then
              echo "::warning::Render API service lookup failed. Falling back to deploy hook if available."
              services_json="[]"
            fi
            api_service_id="$(printf '%s' "$services_json" | node -e '
              let input = "";
              process.stdin.on("data", (chunk) => { input += chunk; });
              process.stdin.on("end", () => {
                try {
                  const rows = JSON.parse(input);
                  const match = rows.find((row) => row?.service?.name === "gmfn-api");
                  process.stdout.write(match?.service?.id || "");
                } catch {
                  process.stdout.write("");
                }
              });
            ')"
          fi
          if [ -z "$api_service_id" ]; then
            echo "::warning::Could not resolve gmfn-api Render service id from RENDER_API_SERVICE_ID or Render API lookup."
          else
            echo "api_service_id=${api_service_id}" >> "$GITHUB_OUTPUT"
            echo "Resolved gmfn-api Render service id."
          fi

      - name: Require exact API deploy credentials
        if: ${{ steps.backend.outputs.should_deploy_api == 'true' && env.RENDER_API_KEY == '' }}
        run: |
          echo "::error::Backend deploys require RENDER_API_KEY so the workflow can deploy the exact GitHub commit through Render's API. The older gmfn-api deploy hook has accepted requests while live API stayed stale, so it is no longer trusted for backend-impacting deploys."
          echo "::error::Configure GitHub secret RENDER_API_KEY and, preferably, RENDER_API_SERVICE_ID for gmfn-api, or deploy gmfn-api manually from the Render dashboard and verify npm --prefix frontend run audit:live-api-identity-routes."
          exit 1

      - name: Require resolved API service
        if: ${{ steps.backend.outputs.should_deploy_api == 'true' && env.RENDER_API_KEY != '' && steps.api_service.outputs.api_service_id == '' }}
        run: |
          echo "::error::RENDER_API_KEY is configured, but the workflow could not resolve the gmfn-api Render service. Set GitHub secret RENDER_API_SERVICE_ID to the gmfn-api service id."
          exit 1

      - name: Trigger API deploy through Render API
        if: ${{ steps.backend.outputs.should_deploy_api == 'true' && env.RENDER_API_KEY != '' && steps.api_service.outputs.api_service_id != '' }}
        run: |
          echo "Triggering Render API deploy for gmfn-api service ${API_SERVICE_ID} at ${GITHUB_SHA}."
          curl -fsS -X POST "https://api.render.com/v1/services/${API_SERVICE_ID}/deploys" \
            -H "accept: application/json" \
            -H "authorization: Bearer ${RENDER_API_KEY}" \
            -H "content-type: application/json" \
            --data "{\"commitId\":\"${GITHUB_SHA}\"}"
          echo "gmfn-api Render API deploy accepted the request."
        env:
          API_SERVICE_ID: ${{ steps.api_service.outputs.api_service_id }}

      - name: Verify live API identity contracts
        if: ${{ steps.backend.outputs.should_deploy_api == 'true' }}
        run: |
          node frontend/tools/audit-live-api-identity-routes.mjs --attempts 18 --delay-ms 20000
