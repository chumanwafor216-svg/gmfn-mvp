services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gmfn
      POSTGRES_USER: gmfn
      POSTGRES_PASSWORD: gmfn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./gmfn_backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg://gmfn:gmfn@db/gmfn
    command: >
      sh -c "
      pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  pgdata: 
